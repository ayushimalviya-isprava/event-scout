const TIER_META = {
  1: { label:"Tier 1", sub:"Clears the trip alone", accent:"#e3b341", glow:"rgba(227,179,65,.16)" },
  2: { label:"Tier 2", sub:"Worth it if in region", accent:"#9fb3c8", glow:"rgba(159,179,200,.12)" },
  3: { label:"Tier 3", sub:"Optional / monitor", accent:"#6b7280", glow:"rgba(107,114,128,.10)" },
};

  Likely:      { c:"#e3b341", t:"Likely" },
  Unconfirmed: { c:"#9ca3af", t:"Unconfirmed" },
};
const STATUS_CYCLE = ["", "interested", "booked", "skip"];
const STATUS_META = {
  interested: { label:"Interested", c:"#e3b341" },
  booked:     { label:"Booked",     c:"#34d399" },
  skip:       { label:"Skip",       c:"#71717a" },
};

const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function monthKey(iso){ const [y,m]=iso.split("-"); return `${y}-${m}`; }
function monthLabel(iso){ const [y,m]=iso.split("-"); return `${MONTHS[+m-1]} ${y}`; }
function dayLabel(e){
  const d=new Date(e.start+"T00:00:00");
  const s=`${MONTHS[d.getMonth()]} ${d.getDate()}`;
  if(e.end){ const ed=new Date(e.end+"T00:00:00"); return `${s}–${ed.getDate()}`; }
  return s;
}

/* ---------------- PERSISTENCE ---------------- */
const LS_KEY="eventScout.v1";
function loadState(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function saveState(s){ try{ localStorage.setItem(LS_KEY, JSON.stringify(s)); }catch(e){} }

/* ---------------- COMPONENTS ---------------- */
function Pill({children, color, soft}){
  return <span className="inline-flex items-center gap-1 rounded-full px-2.5 py-0.5 text-[11px] font-medium tracking-wide"
    style={{ color, background: soft||"transparent", border:`1px solid ${color}33` }}>{children}</span>;
}

function EventCard({e, user, onCycle, onStar}){
  const [open,setOpen]=useState(false);
  const tm=TIER_META[e.tier], cm=CONF_META[e.conf], cat=CATS[e.cat];
  const st=user.status, starred=user.starred;
  return (
    <motion.div layout initial={{opacity:0,y:14}} animate={{opacity:1,y:0}} exit={{opacity:0,y:-8}}
      transition={{duration:.4,ease:[.22,1,.36,1]}} whileHover={{y:-3}}
      className="relative rounded-2xl p-[1px] overflow-hidden"
      style={{ background:`linear-gradient(135deg, ${tm.accent}40, transparent 55%)` }}>
      <div className="rounded-2xl bg-[#0d0d11]/90 backdrop-blur-sm border border-white/[0.06] p-5"
        style={{ boxShadow:`0 1px 0 0 rgba(255,255,255,.03) inset, 0 20px 40px -28px ${tm.glow}` }}>
        <div className="flex items-start justify-between gap-3">
          <div className="flex items-center gap-2 flex-wrap">
            <Pill color={tm.accent} soft={tm.glow}>{tm.label}</Pill>
            <Pill color={cat.dot}><span className="w-1.5 h-1.5 rounded-full" style={{background:cat.dot}}></span>{cat.label}</Pill>
            {e.shortlist && <Pill color="#e3b341" soft="rgba(227,179,65,.14)">★ Top 6</Pill>}
          </div>
          <button onClick={()=>onStar(e.id)} className="text-lg leading-none transition-transform hover:scale-125"
            style={{color: starred?"#e3b341":"#3f3f46"}} title="Star">★</button>
        </div>

        <h3 className="display text-[22px] leading-tight mt-3 text-stone-100">{e.name}</h3>

        <div className="flex items-center gap-3 mt-2 text-sm text-stone-400">
          <span className="text-stone-200 font-medium">{dayLabel(e)}{e.tba && <span className="text-stone-500 font-normal"> · dates TBA</span>}</span>
          <span className="inline-flex items-center gap-1.5"><span className="w-1.5 h-1.5 rounded-full" style={{background:cm.c}}></span>{cm.t}</span>
        </div>
        <div className="text-sm text-stone-400 mt-0.5">{e.city}</div>

        <p className="text-[13.5px] text-stone-300/90 mt-3 leading-relaxed">{e.verdict}</p>

        <AnimatePresence>
        {open && (
          <motion.div initial={{opacity:0,height:0}} animate={{opacity:1,height:"auto"}} exit={{opacity:0,height:0}}
            transition={{duration:.3}} className="overflow-hidden">
            <div className="mt-3 pt-3 border-t border-white/[0.06] space-y-1.5 text-[13px]">
              <div><span className="text-stone-500">Who's in the room · </span><span className="text-stone-300">{e.room}</span></div>
              <div><span className="text-stone-500">Access · </span><span className="text-stone-300">{e.access}</span></div>
              <div><span className="text-stone-500">Cost · </span><span className="text-stone-300">{e.cost}</span></div>
            </div>
          </motion.div>
        )}
        </AnimatePresence>

        <div className="flex items-center justify-between mt-4">
          <div className="flex items-center gap-2">
            <button onClick={()=>setOpen(o=>!o)} className="text-xs text-stone-400 hover:text-stone-200 transition-colors">
              {open?"Less":"Details"}
            </button>
            {e.url && <a href={e.url} target="_blank" rel="noreferrer" className="text-xs text-stone-500 hover:text-amber-300/90 transition-colors">Source ↗</a>}
          </div>
          <button onClick={()=>onCycle(e.id)}
            className="text-xs font-medium rounded-full px-3 py-1 border transition-colors"
            style={ st
              ? { color:STATUS_META[st].c, borderColor:`${STATUS_META[st].c}55`, background:`${STATUS_META[st].c}14` }
              : { color:"#71717a", borderColor:"#27272a" } }>
            {st ? STATUS_META[st].label : "Add to plan"}
          </button>
        </div>
      </div>
    </motion.div>
  );
}

function App(){

  const [cat,setCat]=useState("all");
  const [q,setQ]=useState("");
  const [shortlistOnly,setShortlistOnly]=useState(false);
  const [hideSkip,setHideSkip]=useState(false);

  useEffect(()=>saveState(state),[state]);
  const user=(id)=>state[id]||{};
  const cycle=(id)=>setState(s=>{ const cur=(s[id]&&s[id].status)||""; const ni=(STATUS_CYCLE.indexOf(cur)+1)%STATUS_CYCLE.length;
    return {...s,[id]:{...s[id],status:STATUS_CYCLE[ni]}}; });
  const star=(id)=>setState(s=>({...s,[id]:{...s[id],starred:!(s[id]&&s[id].starred)}}));

  const filtered=useMemo(()=>{
    return EVENTS.filter(e=>{
      if(tier && e.tier!==tier) return false;
      if(cat!=="all" && e.cat!==cat) return false;
      if(shortlistOnly && !e.shortlist) return false;
      if(hideSkip && (user(e.id).status==="skip")) return false;
      if(q){ const s=q.toLowerCase(); if(!(e.name.toLowerCase().includes(s)||e.city.toLowerCase().includes(s)||CATS[e.cat].label.toLowerCase().includes(s))) return false; }
      return true;
    }).sort((a,b)=>a.start.localeCompare(b.start));
  },[tier,cat,q,shortlistOnly,hideSkip,state]);

  const groups=useMemo(()=>{
    const m={}; filtered.forEach(e=>{ const k=monthKey(e.start); (m[k]=m[k]||[]).push(e); });
    return Object.keys(m).sort().map(k=>({k,label:monthLabel(filtered.find(e=>monthKey(e.start)===k).start),items:m[k]}));
  },[filtered]);

  const counts=useMemo(()=>({
    t1:EVENTS.filter(e=>e.tier===1).length, t2:EVENTS.filter(e=>e.tier===2).length, t3:EVENTS.filter(e=>e.tier===3).length,
    planned:Object.values(state).filter(v=>v.status&&v.status!=="skip").length,
  }),[state]);

  const Chip=({active,onClick,children,color})=>(
    <button onClick={onClick}
      className="text-xs px-3 py-1.5 rounded-full border transition-all whitespace-nowrap"
      style={ active
        ? { color:"#0a0a0a", background:color||"#e7e5e4", borderColor:"transparent", fontWeight:600 }
        : { color:"#a1a1aa", borderColor:"#27272a", background:"transparent" } }>{children}</button>
  );

  return (
    <div className="relative z-10 max-w-5xl mx-auto px-5 sm:px-8 pb-28">
      {/* HERO */}
      <header className="pt-14 pb-8">
        <div className="flex items-center gap-2 text-[11px] tracking-[0.25em] uppercase text-amber-300/70">
          <span className="w-6 h-px bg-amber-300/40"></span> Chief of Staff · Network Strategy
        </div>
        <h1 className="display text-5xl sm:text-6xl mt-4 text-stone-100 leading-[1.05]">Event Scout</h1>
        <p className="text-stone-400 mt-3 max-w-xl text-[15px] leading-relaxed">
          A ruthlessly filtered radar of the rooms worth NDS's time — real estate, AI, capital & the India–US corridor.
          <span className="text-stone-500"> Window: Nov 2026 → Nov 2027.</span>
        </p>
        <div className="flex flex-wrap gap-x-6 gap-y-2 mt-6 text-sm">
          <span className="text-stone-500">Tracking <b className="text-stone-200">{EVENTS.length}</b> events</span>
          <span style={{color:TIER_META[1].accent}}>● {counts.t1} Tier 1</span>
          <span style={{color:TIER_META[2].accent}}>● {counts.t2} Tier 2</span>
          <span style={{color:TIER_META[3].accent}}>● {counts.t3} Tier 3</span>
          <span className="text-stone-500">In plan: <b className="text-stone-200">{counts.planned}</b></span>
        </div>
      </header>

      {/* CONTROLS */}
      <div className="sticky top-0 z-20 -mx-5 sm:-mx-8 px-5 sm:px-8 py-3 bg-[#08080b]/85 backdrop-blur-md border-b border-white/[0.06]">
        <div className="flex flex-col gap-3">
          <div className="flex items-center gap-2">
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Search events, cities…"
              className="flex-1 bg-white/[0.03] border border-white/10 rounded-full px-4 py-2 text-sm text-stone-200 placeholder:text-stone-600 focus:outline-none focus:border-amber-300/40"/>
          </div>
          <div className="flex items-center gap-2 overflow-x-auto pb-1">
            <Chip active={tier===0} onClick={()=>setTier(0)}>All tiers</Chip>
            <Chip active={tier===1} onClick={()=>setTier(1)} color={TIER_META[1].accent}>Tier 1</Chip>
            <Chip active={tier===2} onClick={()=>setTier(2)} color={TIER_META[2].accent}>Tier 2</Chip>
            <Chip active={tier===3} onClick={()=>setTier(3)} color={TIER_META[3].accent}>Tier 3</Chip>
            <span className="w-px h-5 bg-white/10 mx-1 shrink-0"></span>
            <Chip active={cat==="all"} onClick={()=>setCat("all")}>All</Chip>
            {Object.entries(CATS).map(([k,v])=>(
              <Chip key={k} active={cat===k} onClick={()=>setCat(k)} color={v.dot}>{v.label}</Chip>
            ))}
            <span className="w-px h-5 bg-white/10 mx-1 shrink-0"></span>
            <Chip active={shortlistOnly} onClick={()=>setShortlistOnly(v=>!v)} color="#e3b341">★ Top 6</Chip>
            <Chip active={hideSkip} onClick={()=>setHideSkip(v=>!v)}>Hide skips</Chip>
          </div>
        </div>
      </div>

      {/* TIMELINE */}
      <main className="mt-8">
        {groups.length===0 && (
          <div className="text-center py-24 text-stone-600">No events match. Loosen the filters.</div>
        )}
        {groups.map(g=>(
          <section key={g.k} className="mb-10">
            <div className="flex items-center gap-4 mb-4">
              <h2 className="display text-xl text-stone-300">{g.label}</h2>
              <span className="text-xs text-stone-600">{g.items.length} event{g.items.length>1?"s":""}</span>
              <div className="flex-1 h-px bg-gradient-to-r from-white/10 to-transparent"></div>
            </div>
            <motion.div layout className="grid sm:grid-cols-2 gap-4">
              <AnimatePresence>
                {g.items.map(e=>(
                  <EventCard key={e.id} e={e} user={user(e.id)} onCycle={cycle} onStar={star}/>
                ))}
              </AnimatePresence>
            </motion.div>
          </section>
        ))}
      </main>

      <footer className="mt-16 pt-6 border-t border-white/[0.06] text-xs text-stone-600 leading-relaxed">
        Dates are pre-judge estimates tagged by confidence (Confirmed / Likely / Unconfirmed). The Apps Script watcher
        diffs each source's date page; Claude's judge pass firms up dates, tiers & verdicts. Attendee profiles are
        sourced or marked “typical profile” — never invented. Your plan & stars are saved locally in this browser.
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
